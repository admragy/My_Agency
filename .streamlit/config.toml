[theme]
base = "light"               # يجبر النظام على الوضع النهاري (أبيض)
primaryColor = "#2563EB"     # أزرق ملكي (لون الثقة)
backgroundColor = "#F8F9FB"  # رمادي فاتح جداً (مريح للعين)
secondaryBackgroundColor = "#FFFFFF" # أبيض ناصع للكروت والقوائم
textColor = "#1F2937"        # أسود رمادي (للقراءة المريحة)
font = "sans serif"          # خط عصري
